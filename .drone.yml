---
kind: pipeline
type: kubernetes
name: staging-combined

trigger:
  branch:
    - staging

steps:
  # Step 1: Build and publish backend Docker image
  - name: publish-backend
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/retail-agent-shopping-ap2-ucp-backend
      dockerfile: backend/Dockerfile
      context: backend
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  # Step 2: Build and publish frontend Docker image
  - name: publish-frontend
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/retail-agent-shopping-ap2-ucp-frontend
      dockerfile: Dockerfile.frontend
      context: .
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  # Step 3: Build and publish mandate ledger service Docker image
  - name: publish-mandate-ledger
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/retail-agent-shopping-ap2-ucp-mandate-ledger
      dockerfile: mandate_ledger_service/Dockerfile
      context: mandate_ledger_service
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  # Step 4: Deploy combined pod (frontend + backend + mandate-ledger sidecars) to Kubernetes
  - name: deploy-combined-staging
    image: public.ecr.aws/kanopy/drone-helm:v3
    settings:
      chart: mongodb/web-app
      chart_version: 4.25.0
      add_repos: [mongodb=https://10gen.github.io/helm-charts]
      namespace: industrysolutions
      release: retail-agent-shopping-ap2-ucp-staging
      values_files: ["environment/staging.yaml"]
      values:
        - "sidecarContainers[0].image=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/retail-agent-shopping-ap2-ucp-backend:git-${DRONE_COMMIT_SHA:0:7}"
        - "sidecarContainers[1].image=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/retail-agent-shopping-ap2-ucp-mandate-ledger:git-${DRONE_COMMIT_SHA:0:7}"
        - "image.tag=git-${DRONE_COMMIT_SHA:0:7}"
        - "image.repository=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/retail-agent-shopping-ap2-ucp-frontend"
        - "ingress.enabled=true"
        - "ingress.hosts[0]=retail-agent-shopping-ap2-ucp.industrysolutions.staging.corp.mongodb.com"
        - "mesh.enabled=true"
        # Frontend resources (reduced defaults for demos - increase if OOMKilled)
        - "resources.limits.cpu=500m"
        - "resources.limits.memory=512Mi"
        - "resources.requests.cpu=100m"
        - "resources.requests.memory=256Mi"
        # Backend sidecar resources (increased to 1Gi for ML/AI workload - was OOMKilled at 768Mi)
        - "sidecarContainers[0].resources.limits.cpu=500m"
        - "sidecarContainers[0].resources.limits.memory=1Gi"
        - "sidecarContainers[0].resources.requests.cpu=100m"
        - "sidecarContainers[0].resources.requests.memory=512Mi"
        # Mandate ledger sidecar resources (reduced defaults for demos - increase if OOMKilled)
        - "sidecarContainers[1].resources.limits.cpu=500m"
        - "sidecarContainers[1].resources.limits.memory=512Mi"
        - "sidecarContainers[1].resources.requests.cpu=100m"
        - "sidecarContainers[1].resources.requests.memory=256Mi"
      api_server: https://api.staging.corp.mongodb.com
      kubernetes_token:
        from_secret: staging_kubernetes_token
    when:
      branch:
        - staging
      event:
        - push

---
kind: pipeline
type: kubernetes
name: production-combined

trigger:
  branch:
    - main
  event:
    - push

steps:
  # Step 1: Build and publish backend Docker image
  - name: publish-backend-prod
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/retail-agent-shopping-ap2-ucp-backend-prod
      dockerfile: backend/Dockerfile
      context: backend
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  # Step 2: Build and publish frontend Docker image
  - name: publish-frontend-prod
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/retail-agent-shopping-ap2-ucp-frontend-prod
      dockerfile: Dockerfile.frontend
      context: .
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  # Step 3: Build and publish mandate ledger service Docker image
  - name: publish-mandate-ledger-prod
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/retail-agent-shopping-ap2-ucp-mandate-ledger-prod
      dockerfile: mandate_ledger_service/Dockerfile
      context: mandate_ledger_service
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  # Step 4: Deploy combined pod to production
  - name: deploy-combined-prod
    image: public.ecr.aws/kanopy/drone-helm:v3
    settings:
      chart: mongodb/web-app
      chart_version: 4.25.0
      add_repos: [mongodb=https://10gen.github.io/helm-charts]
      namespace: industrysolutions
      release: retail-agent-shopping-ap2-ucp-prod
      values_files: ["environment/production.yaml"]
      values:
        - "sidecarContainers[0].image=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/retail-agent-shopping-ap2-ucp-backend-prod:git-${DRONE_COMMIT_SHA:0:7}"
        - "sidecarContainers[1].image=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/retail-agent-shopping-ap2-ucp-mandate-ledger-prod:git-${DRONE_COMMIT_SHA:0:7}"
        - "image.tag=git-${DRONE_COMMIT_SHA:0:7}"
        - "image.repository=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/retail-agent-shopping-ap2-ucp-frontend-prod"
        - "ingress.enabled=true"
        - "ingress.hosts[0]=retail-agent-shopping-ap2-ucp.industrysolutions.prod.corp.mongodb.com"
        - "mesh.enabled=true"
        # Frontend resources (production - slightly higher for reliability)
        - "resources.limits.cpu=500m"
        - "resources.limits.memory=512Mi"
        - "resources.requests.cpu=150m"
        - "resources.requests.memory=256Mi"
        # Backend sidecar resources (production - increased to 1Gi for ML/AI workload)
        - "sidecarContainers[0].resources.limits.cpu=500m"
        - "sidecarContainers[0].resources.limits.memory=1Gi"
        - "sidecarContainers[0].resources.requests.cpu=150m"
        - "sidecarContainers[0].resources.requests.memory=512Mi"
        # Mandate ledger sidecar resources (production - slightly higher for reliability)
        - "sidecarContainers[1].resources.limits.cpu=500m"
        - "sidecarContainers[1].resources.limits.memory=512Mi"
        - "sidecarContainers[1].resources.requests.cpu=150m"
        - "sidecarContainers[1].resources.requests.memory=256Mi"
      api_server: https://api.prod.corp.mongodb.com
      kubernetes_token:
        from_secret: prod_kubernetes_token
    when:
      branch:
        - main
      event:
        - push