version: 2
updates:
  # NPM updates - weekly, grouped
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "javascript"
    reviewers:
      - "mongodb-industry-solutions/ist-techhub"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Group all patch updates together
      patch-updates:
        update-types: ["patch"]
      # Group all minor updates together  
      minor-updates:
        update-types: ["minor"]
      # Group all major updates together
      major-updates:
        update-types: ["major"]
