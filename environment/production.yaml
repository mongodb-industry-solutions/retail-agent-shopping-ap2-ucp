env:
  NODE_ENV: prod
  # AWS region for IRSA (no credentials needed)
  AWS_REGION: us-east-1
  # Backend API URL for frontend to connect to backend health check
  NEXT_PUBLIC_BACKEND_ENDPOINT: http://localhost:8000 # Backend API URL; localhost assumes backend is co-located (e.g., sidecar). Update to the actual backend endpoint for production.

## Single Pod Containers
envSecrets:
  # MongoDB Configuration
  MONGODB_URI: retail-ap2
  #DATABASE_NAME: <secret-group> 
  
## should be used in case of multi-pod container i.e: both frontend and backend in one pod
sidecarContainers:
  - name: backend
    # Image will be overridden by Drone pipeline with specific git-SHA tag
    image: 795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/retail-agent-shopping-ap2-ucp-backend-prod:latest
    
    # Expose backend port (accessible via localhost from frontend)
    ports:
      - containerPort: 8000
        name: backend
    
    # Environment variables for backend container
    env:
      - name: NODE_ENV
        value: prod
      
      - name: MANDATE_LEDGER_SERVICE_URL
        value: http://localhost:5000
      
      # MongoDB Configuration (from secrets)
      - name: MONGODB_URI
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: MONGODB_URI

  - name: mandate-ledger
    # Image will be overridden by Drone pipeline with specific git-SHA tag
    image: 795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/retail-agent-shopping-ap2-ucp-mandate-ledger-prod:latest
    
    # Expose mandate ledger service port (accessible via localhost from other containers)
    ports:
      - containerPort: 5000
        name: mandate-ledger
    
    # Environment variables for mandate ledger service container
    env:
      - name: NODE_ENV
        value: prod
      
      # MongoDB Configuration (from secrets)
      - name: MONGODB_URI
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: MONGODB_URI

## ----------------------------- Cloud Specific Configurations -----------------------------

# GCP Workload Identity Federation configuration  
serviceAccount:
  enabled: true
  name: retail-agent-shopping-ap2-ucp-gcp-sa  # Kubernetes service account for GCP WIF

# Mount GCP credential config AND projected service account token
extraVolumes:
  - name: gcp-creds
    configMap:
      name: gcp-wif-config-retail
  - name: gcp-token
    projected:
      sources:
        - serviceAccountToken:
            path: token
            expirationSeconds: 3600  # Token expires after 1 hour and auto-renews
            audience: "//iam.googleapis.com/projects/531154772515/locations/global/workloadIdentityPools/kanopy-retail-wif-pool/providers/kanopy-retail-provider"

extraVolumeMounts:
  - name: gcp-creds
    mountPath: /etc/gcp
    readOnly: true
  - name: gcp-token
    mountPath: /var/run/service-account
    readOnly: true
