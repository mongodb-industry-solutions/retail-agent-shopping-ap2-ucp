env:
  NODE_ENV: staging
  # AWS region for IRSA (no credentials needed)
  AWS_REGION: us-east-1
  # Backend API URL for frontend to connect to backend health check - get <service-name> using kubectl get services
  NEXT_PUBLIC_BACKEND_ENDPOINT: http://localhost:8000 # Multi-container pod setup - backend sidecar accessible via localhost
  #COLLECTION_NAME: test-collection

## Single Pod Containers
envSecrets:
  # MongoDB Configuration
  MONGODB_URI: retail-ap2
  MONGODB_DATABASE: retail-ap2
  # Google Cloud Configuration
  GOOGLE_GENAI_USE_VERTEXAI: retail-ap2
  GOOGLE_CLOUD_PROJECT: retail-ap2
  GOOGLE_CLOUD_LOCATION: retail-ap2
  # Mandate Ledger Configuration
  MANDATE_LEDGER_SERVICE_URL: retail-ap2
  MANDATE_LEDGER_API_KEY: retail-ap2
  # Bootstrap and Auth Configuration
  ENABLE_BOOTSTRAP_AUTH: retail-ap2
  BOOTSTRAP_ADMIN_KEY: retail-ap2
  # Rate Limiting
  DEFAULT_RATE_LIMIT_PER_MINUTE: retail-ap2
  # CORS Configuration
  ALLOWED_CORS_ORIGINS: retail-ap2
  # Service Configuration
  SERVICE_NAME: retail-ap2
  ENVIRONMENT: retail-ap2

## should be used in case of multiple sidecar containers
sidecarContainers:
  - name: backend
    # Image will be overridden by Drone pipeline with specific git-SHA tag
    image: 795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/retail-agent-shopping-ap2-ucp-backend:latest
    
    # Expose backend port (accessible via localhost from frontend)
    ports:
      - containerPort: 8000
        name: backend
    
    # Environment variables for backend container
    env:
      - name: NODE_ENV
        value: staging
      
      - name: MANDATE_LEDGER_SERVICE_URL
        value: http://localhost:5000
        
      # Google GenAI Configuration - Use Vertex AI with Workload Identity
      - name: GOOGLE_GENAI_USE_VERTEXAI
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: GOOGLE_GENAI_USE_VERTEXAI
      
      - name: GOOGLE_CLOUD_PROJECT
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: GOOGLE_CLOUD_PROJECT
      
      - name: GOOGLE_CLOUD_LOCATION
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: GOOGLE_CLOUD_LOCATION
      
      # GCP Workload Identity Configuration
      - name: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/gcp/credential-config.json
      
      # MongoDB Configuration (from secrets)
      - name: MONGODB_URI
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: MONGODB_URI
      
      - name: MONGODB_DATABASE
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: MONGODB_DATABASE
      
      # Mandate Ledger Configuration (from secrets)
      - name: MANDATE_LEDGER_API_KEY
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: MANDATE_LEDGER_API_KEY
      
      # Bootstrap and Auth Configuration (from secrets)
      - name: ENABLE_BOOTSTRAP_AUTH
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: ENABLE_BOOTSTRAP_AUTH
      
      - name: BOOTSTRAP_ADMIN_KEY
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: BOOTSTRAP_ADMIN_KEY
      
      # Rate Limiting Configuration (from secrets)
      - name: DEFAULT_RATE_LIMIT_PER_MINUTE
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: DEFAULT_RATE_LIMIT_PER_MINUTE
      
      # CORS Configuration (from secrets)
      - name: ALLOWED_CORS_ORIGINS
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: ALLOWED_CORS_ORIGINS
      
      # Service Configuration (from secrets)
      - name: SERVICE_NAME
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: SERVICE_NAME
      
      - name: ENVIRONMENT
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: ENVIRONMENT
    
    # Mount GCP credentials and tokens for Workload Identity
    volumeMounts:
      - name: gcp-creds
        mountPath: /etc/gcp
        readOnly: true
      - name: gcp-token
        mountPath: /var/run/service-account
        readOnly: true

  - name: mandate-ledger
    # Image will be overridden by Drone pipeline with specific git-SHA tag
    image: 795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/retail-agent-shopping-ap2-ucp-mandate-ledger:latest
    
    # Expose mandate ledger service port (accessible via localhost from other containers)
    ports:
      - containerPort: 5000
        name: mandate-ledger
    
    # Environment variables for mandate ledger service container
    env:
      - name: NODE_ENV
        value: staging
      
      # MongoDB Configuration (from secrets)
      - name: MONGODB_URI
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: MONGODB_URI
      
      - name: MONGODB_DATABASE
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: MONGODB_DATABASE
      
      # Mandate Ledger Configuration (from secrets)
      - name: MANDATE_LEDGER_API_KEY
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: MANDATE_LEDGER_API_KEY
      
      # Bootstrap and Auth Configuration (from secrets)
      - name: ENABLE_BOOTSTRAP_AUTH
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: ENABLE_BOOTSTRAP_AUTH
      
      - name: BOOTSTRAP_ADMIN_KEY
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: BOOTSTRAP_ADMIN_KEY
      
      # Rate Limiting Configuration (from secrets)
      - name: DEFAULT_RATE_LIMIT_PER_MINUTE
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: DEFAULT_RATE_LIMIT_PER_MINUTE
      
      # CORS Configuration (from secrets)
      - name: ALLOWED_CORS_ORIGINS
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: ALLOWED_CORS_ORIGINS
      
      # Service Configuration (from secrets)
      - name: SERVICE_NAME
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: SERVICE_NAME
      
      - name: ENVIRONMENT
        valueFrom:
          secretKeyRef:
            name: retail-ap2
            key: ENVIRONMENT
    
## ----------------------------- Cloud Specific Configurations -----------------------------

# GCP Workload Identity Federation configuration
serviceAccount:
  enabled: true
  name: retail-agent-shopping-ap2-ucp-gcp-sa  # Kubernetes service account for GCP WIF

# Mount GCP credential config AND projected service account token
extraVolumes:
  - name: gcp-creds
    configMap:
      name: gcp-wif-config-retail
  - name: gcp-token
    projected:
      sources:
        - serviceAccountToken:
            path: token
            expirationSeconds: 3600  # Token expires after 1 hour and auto-renews
            audience: "//iam.googleapis.com/projects/531154772515/locations/global/workloadIdentityPools/kanopy-retail-wif-pool/providers/kanopy-retail-provider"

extraVolumeMounts:
  - name: gcp-creds
    mountPath: /etc/gcp
    readOnly: true
  - name: gcp-token
    mountPath: /var/run/service-account
    readOnly: true